version: "3.9"

services:
  db:
    image: postgres:15
    container_name: qa_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: qa_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/appdb
      JWT_SECRET: supersecret
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    command: ["sh", "./docker-entrypoint.sh"]

volumes:
  postgres_data: